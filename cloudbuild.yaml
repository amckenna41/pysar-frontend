# Google Cloud Build — build and deploy pySAR backend to Cloud Run
# Triggered automatically on push to main, or manually via:
#   gcloud builds submit --config cloudbuild.yaml .

substitutions:
  _REGION: europe-west1           # region where the Cloud Run service is deployed
  _SERVICE: pysar-backend
  _REPO: pysar                    # Artifact Registry repository name
  _CORS_ORIGIN: https://pysar-app.vercel.app

steps:
  # Create Artifact Registry repo if it doesn't already exist
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud artifacts repositories describe $_REPO \
          --location=$_REGION --project=$PROJECT_ID 2>/dev/null || \
        gcloud artifacts repositories create $_REPO \
          --location=$_REGION --repository-format=docker --project=$PROJECT_ID

  # Build the Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE
      - .

  # Push to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE

  # Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated       # public API
      - --memory=1Gi
      - --cpu=1
      - --min-instances=1             # keep warm — no cold starts
      - --max-instances=3
      - --timeout=3600                # allow long encoding jobs (max 1 hour)
      - --startup-cpu-boost            # extra CPU during cold start to load numpy/scipy faster
      - --set-env-vars=CORS_ORIGIN=$_CORS_ORIGIN

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE
