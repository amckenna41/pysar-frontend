name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: install, build ─────────────────────────────────────────────────
  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  # ── Backend: lint, type-check, import smoke-test ─────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install lint tools
        run: pip install flake8

      # Lint: errors and undefined names only (E9xx, F63x, F7xx, F82x)
      - name: Lint with flake8
        run: |
          flake8 backend/ api/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      # Verify the FastAPI app module imports without errors
      - name: Smoke-test backend import
        run: python -c "from backend.main import app; print('App import OK')"
