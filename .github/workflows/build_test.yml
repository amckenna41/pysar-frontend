name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: install, build, unit tests ─────────────────────────────────────
  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # Run Vitest unit tests (jsdom environment, no browser required)
      - name: Run unit tests
        run: npm test

  # ── Backend: lint, import smoke-test, pytest ──────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install lint tools
        run: pip install flake8

      # Lint: errors and undefined names only (E9xx, F63x, F7xx, F82x)
      - name: Lint with flake8
        run: |
          flake8 backend/ api/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      # Verify the FastAPI app module imports without errors
      - name: Smoke-test backend import
        run: python -c "from backend.main import app; print('App import OK')"

      # Run pytest unit + integration tests
      # pySAR and aaindex are pre-mocked in conftest.py so no real encoding occurs
      - name: Run backend tests
        run: pytest -m "not slow" --tb=short -q

  # ── E2E: Playwright with real Vite dev server + lightweight backend ────────────
  e2e:
    name: E2E (Playwright / Chromium)
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install backend runtime deps WITHOUT pySAR — the E2E encode routes are
      # all intercepted via page.route(), so pySAR is never invoked.
      - name: Install backend runtime dependencies
        run: |
          pip install \
            "fastapi>=0.115.0" \
            "uvicorn[standard]>=0.30.0" \
            "python-multipart>=0.0.9" \
            "pandas>=2.0.0" \
            numpy scipy scikit-learn \
            "aaindex>=1.2.0" \
            "protpy>=1.3.0" \
            requests

      # Start the FastAPI backend in the background; encode endpoint is never
      # reached in E2E tests (mocked via Playwright route interception).
      - name: Start backend server
        run: |
          uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          echo "Backend PID=$!" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install root dependencies (Playwright)
        run: npm ci

      # Download only the Chromium binary + OS-level dependencies
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Poll /api/health until the backend is accepting requests (max 40 s)
      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/api/health && echo "Backend ready." && break
            echo "  attempt $i/20 — retrying in 2 s"
            sleep 2
          done

      # Playwright auto-starts Vite via webServer config; CI=true so it always
      # spawns a fresh dev server rather than reusing an existing one.
      - name: Run E2E tests
        run: npx playwright test

      # Upload trace / screenshot artifacts on failure for debugging
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
